<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">星语宇宙网站预览图</title>
  <desc id="desc">深空蓝紫背景上的星语宇宙中文天文科普站封面，包含星轨、行星、导航卡片和内容板块。</desc>
  <defs>
    <radialGradient id="nebulaA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(328 168) rotate(42) scale(560 340)">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.72"/>
      <stop offset="0.42" stop-color="#38BDF8" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 520) rotate(-28) scale(520 300)">
      <stop offset="0" stop-color="#EC4899" stop-opacity="0.48"/>
      <stop offset="0.36" stop-color="#22D3EE" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="184" y1="138" x2="1096" y2="638" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#111827" stop-opacity="0.66"/>
    </linearGradient>
    <linearGradient id="accent" x1="264" y1="246" x2="886" y2="418" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="0.45" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#F0ABFC"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#020617"/>
  <rect width="1280" height="720" fill="url(#nebulaA)"/>
  <rect width="1280" height="720" fill="url(#nebulaB)"/>

  <g opacity="0.75">
    <circle cx="94" cy="88" r="1.6" fill="#E0F2FE"/>
    <circle cx="162" cy="244" r="1.2" fill="#BAE6FD"/>
    <circle cx="276" cy="74" r="1.8" fill="#F5D0FE"/>
    <circle cx="402" cy="126" r="1.1" fill="#E0E7FF"/>
    <circle cx="516" cy="58" r="1.4" fill="#E0F2FE"/>
    <circle cx="712" cy="102" r="1.5" fill="#F8FAFC"/>
    <circle cx="828" cy="74" r="1.2" fill="#C4B5FD"/>
    <circle cx="1018" cy="104" r="1.7" fill="#BAE6FD"/>
    <circle cx="1162" cy="72" r="1.1" fill="#F8FAFC"/>
    <circle cx="1196" cy="238" r="1.6" fill="#E9D5FF"/>
    <circle cx="1084" cy="348" r="1.2" fill="#E0F2FE"/>
    <circle cx="118" cy="616" r="1.4" fill="#BAE6FD"/>
    <circle cx="236" cy="548" r="1.1" fill="#F8FAFC"/>
    <circle cx="438" cy="654" r="1.5" fill="#DDD6FE"/>
    <circle cx="694" cy="626" r="1.2" fill="#F5D0FE"/>
    <circle cx="916" cy="660" r="1.6" fill="#E0F2FE"/>
    <circle cx="1138" cy="596" r="1.3" fill="#F8FAFC"/>
  </g>

  <path d="M813 220C930 164 1058 178 1132 250" stroke="#A78BFA" stroke-width="2" stroke-opacity="0.22"/>
  <path d="M800 250C945 194 1086 226 1150 318" stroke="#67E8F9" stroke-width="1.4" stroke-opacity="0.18"/>
  <path d="M820 280C946 252 1052 286 1110 360" stroke="#F0ABFC" stroke-width="1.2" stroke-opacity="0.18"/>

  <g filter="url(#cardShadow)">
    <rect x="152" y="102" width="976" height="520" rx="34" fill="url(#panel)" stroke="#334155" stroke-opacity="0.72"/>
    <rect x="180" y="130" width="920" height="64" rx="22" fill="#020617" fill-opacity="0.52" stroke="#475569" stroke-opacity="0.45"/>
    <circle cx="218" cy="162" r="8" fill="#F87171" opacity="0.9"/>
    <circle cx="246" cy="162" r="8" fill="#FBBF24" opacity="0.9"/>
    <circle cx="274" cy="162" r="8" fill="#34D399" opacity="0.9"/>
    <text x="322" y="169" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18">aaa111-sta.github.io</text>

    <g transform="translate(228 252)">
      <text x="0" y="0" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" letter-spacing="3">ASTRONOMY NOTES</text>
      <text x="0" y="74" fill="url(#accent)" font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', sans-serif" font-size="72" font-weight="800">星语宇宙</text>
      <text x="0" y="126" fill="#E2E8F0" font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', sans-serif" font-size="28">中文天文科普 · 星空观测 · 宇宙实验室</text>
      <text x="0" y="176" fill="#94A3B8" font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', sans-serif" font-size="21">用清晰的文章、笔记和视觉页面，把宇宙知识整理成可持续扩展的网站。</text>
    </g>

    <g transform="translate(228 500)">
      <rect x="0" y="0" width="154" height="54" rx="18" fill="#1E293B" stroke="#38BDF8" stroke-opacity="0.45"/>
      <text x="28" y="35" fill="#BAE6FD" font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', sans-serif" font-size="19">天文文章</text>
      <rect x="174" y="0" width="154" height="54" rx="18" fill="#1E293B" stroke="#A78BFA" stroke-opacity="0.45"/>
      <text x="202" y="35" fill="#DDD6FE" font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', sans-serif" font-size="19">星图笔记</text>
      <rect x="348" y="0" width="174" height="54" rx="18" fill="#1E293B" stroke="#F0ABFC" stroke-opacity="0.45"/>
      <text x="376" y="35" fill="#F5D0FE" font-family="Inter, 'Noto Sans SC', 'Microsoft YaHei', sans-serif" font-size="19">宇宙实验室</text>
    </g>

    <g transform="translate(834 250)" filter="url(#softGlow)">
      <circle cx="122" cy="132" r="82" fill="#4C1D95"/>
      <circle cx="102" cy="110" r="58" fill="#7C3AED" opacity="0.9"/>
      <circle cx="88" cy="92" r="24" fill="#C4B5FD" opacity="0.95"/>
      <ellipse cx="122" cy="132" rx="136" ry="34" transform="rotate(-18 122 132)" stroke="#67E8F9" stroke-width="7" stroke-opacity="0.68"/>
      <ellipse cx="122" cy="132" rx="150" ry="42" transform="rotate(-18 122 132)" stroke="#F0ABFC" stroke-width="2" stroke-opacity="0.45"/>
    </g>
  </g>
</svg>
